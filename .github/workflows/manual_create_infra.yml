name: "Manually create infra"

on:
  workflow_dispatch:
    inputs:
      key:
        required: true
        type: string

concurrency:
  group: review-app-infra-${{ inputs.key }}
  cancel-in-progress: false

env:
  aws_region: eu-west-2

jobs:
  plan:
    name: Plan infra
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: communitiesuk/submit-social-housing-lettings-and-sales-data-infrastructure
          ref: main

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.aws_region }}
          role-to-assume: arn:aws:iam::815624722760:role/core-application-repo

      - name: Terraform plan
        working-directory: terraform/staging
        run: |
          terraform init
          terraform plan -out=tfplan

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/staging
  approve:
    needs: plan
    runs-on: ubuntu-latest
    environment: terraform
    steps:
      - run: echo "Waiting for manual approval to continue..."
  deploy:
    needs: approve
    name: Deploy infra
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: communitiesuk/submit-social-housing-lettings-and-sales-data-infrastructure
          ref: main

      - name: Download tfplan artifact
        uses: actions/download-artifact@v5
        with:
          name: tfplan
          path: terraform/staging

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.aws_region }}
          role-to-assume: arn:aws:iam::815624722760:role/core-application-repo

      - name: Terraform apply
        working-directory: terraform/staging
        env:
          workspace: ${{ inputs.key }}
        run: |
          terraform init
          terraform apply tfplan
